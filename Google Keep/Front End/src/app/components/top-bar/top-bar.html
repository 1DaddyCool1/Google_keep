<mat-toolbar class="top-bar">
  <button mat-icon-button class="menu-button" (click)="onMenuClick()" aria-label="Menu">
    <mat-icon>menu</mat-icon>
  </button>
  
  <div class="app-title">
    <mat-icon class="app-logo">lightbulb</mat-icon>
    <span class="title-text">Google Keep</span>
  </div>
  
  <span class="spacer"></span>
  
  <div class="user-section">
    @if (currentUser$ | async; as user) {
      <button mat-icon-button [matMenuTriggerFor]="userMenu" aria-label="User account">
        <mat-icon>account_circle</mat-icon>
      </button>
      
      <mat-menu #userMenu="matMenu">
        <div class="user-info" mat-menu-item disabled>
          <strong>{{ user.username }}</strong>
        </div>
        <mat-divider></mat-divider>
        <button mat-menu-item (click)="onLogout()">
          <mat-icon>logout</mat-icon>
          <span>Logout</span>
        </button>
      </mat-menu>
    }
  </div>
</mat-toolbar>
