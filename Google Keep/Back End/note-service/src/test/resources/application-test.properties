# Test Configuration
spring.application.name=notes=service-test

# Use H2 in-memory database for tests
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Disable Eureka for isolated testing
eureka.client.enabled=false
spring.cloud.discovery.enabled=false

# JWT Configuration (for testing)
jwt.secret=testSecretKeyForJWTTokenGenerationInTestEnvironmentOnly123456789

# Logging
logging.level.root=INFO
logging.level.com.rajan.keep=DEBUG

# Disable scheduling for tests
spring.task.scheduling.enabled=false

# Disable Zipkin/Tracing for tests
management.tracing.enabled=false
management.zipkin.tracing.endpoint=