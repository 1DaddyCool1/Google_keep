spring.application.name=api-gateway
server.port=8080

# Eureka Client Configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# Gateway Routes
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# Route configurations
# Auth Service
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://auth-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

# Labels Service
spring.cloud.gateway.routes[1].id=label-service
spring.cloud.gateway.routes[1].uri=lb://label-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/labels/**

# Notes Service
spring.cloud.gateway.routes[2].id=note-service
spring.cloud.gateway.routes[2].uri=lb://note-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/notes/**

# Media Service
spring.cloud.gateway.routes[3].id=media-service
spring.cloud.gateway.routes[3].uri=lb://media-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/media/**

# Swagger UI (Auth Service)
spring.cloud.gateway.routes[4].id=auth-service-swagger
spring.cloud.gateway.routes[4].uri=lb://auth-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/swagger-ui/**,/v3/api-docs/**,/swagger-resources/**,/webjars/**

# CORS Configuration
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=http://localhost:4200,http://localhost:3000
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=true

# Logging Configuration
logging.file.path=./logs
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Distributed Tracing Configuration
management.tracing.enabled=true
management.tracing.sampling.probability=1.0
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]
# Disable Zipkin export - we only use tracing for logs in ELK
management.zipkin.tracing.export.enabled=false

