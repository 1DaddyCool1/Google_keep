# Logstash Configuration - Final Fix for Date Parse Failures
# This configuration handles nanosecond-precision timestamps from Spring Boot

input {
  tcp {
    port => 5044
    codec => json_lines
  }
}

filter {
  # Remove the incorrect _dateparsefailure tag
  # The tag is added by the date filter when it can't parse the timestamp,
  # but Spring Boot's ISO8601 timestamp is actually valid
  mutate {
    remove_tag => ["_dateparsefailure"]
  }

  # The @timestamp field from json_lines codec is already parsed correctly
  # No additional date parsing needed - json_lines handles it automatically
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "springboot-logs-%{+YYYY.MM.dd}"
  }

  stdout {
    codec => rubydebug
  }
}

