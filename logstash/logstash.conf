# Logstash Configuration for Spring Boot LogstashTcpSocketAppender
# Updated to properly handle JSON logs from Logstash Logback Encoder

input {
  tcp {
    port => 5044
    codec => json_lines
  }
}

filter {
  # Remove the _dateparsefailure tag
  # The json_lines codec already handles timestamp parsing correctly
  mutate {
    remove_tag => ["_dateparsefailure"]
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "springboot-logs-%{+YYYY.MM.dd}"
  }

  # Output to stdout for debugging (can be removed in production)
  stdout {
    codec => rubydebug
  }
}

